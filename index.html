<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pump Flow Tracker & Cloud Ledger Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #343a40;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            font-size: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h2, h3, h4 {
            margin: 10px 0;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .wallet-banner {
            background: var(--dark);
            color: #fff;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .wallet-banner span { color: #2bef66; }

        .drawer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 5px;
        }

        .drawer-box {
            background: #e9ecef;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            border: 1px solid #ccc;
        }

        .note-title { font-weight: bold; font-size: 0.95rem; color: #495057; }
        .note-count { font-size: 1.5rem; font-weight: bold; margin: 4px 0; color: #000; }

        .counter-btn {
            width: 40%;
            padding: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #aaa;
        }

        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }

        .btn-choice {
            padding: 15px 10px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #ccc;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            color: #333;
        }

        .btn-choice.active {
            background: var(--primary) !important;
            color: white !important;
            border-color: var(--primary) !important;
        }

        .btn-choice.fuel-diesel.active {
            background: #fd7e14 !important;
            border-color: #fd7e14 !important;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem; }

        .big-input, .text-input {
            width: 100%;
            box-sizing: border-box;
            border: 2px solid #aaa;
            border-radius: 8px;
            background-color: #fff;
            text-align: center;
        }
        .big-input { padding: 12px 10px; font-size: 2rem; font-weight: bold; }
        .text-input { padding: 12px; font-size: 1.2rem; text-align: left; }

        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .chip {
            background: #e0e0e0; padding: 12px 16px; font-size: 1.1rem; font-weight: bold;
            border-radius: 20px; cursor: pointer; border: none; color: #333; flex: 1; text-align: center;
        }
        .chip-manage { background: #333; color: white; flex: none; }

        .math-panel {
            background: #e9ecef; padding: 12px; border-radius: 8px; margin-bottom: 15px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .math-box { text-align: center; }
        .math-val { font-size: 1.8rem; font-weight: bold; }
        
        .suggestion-box {
            background: #fff3cd; border: 2px dashed #ffc107; padding: 12px;
            border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; font-size: 1.1rem; color: #856404;
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }

        .btn-submit {
            width: 100%; padding: 18px; font-size: 1.5rem; font-weight: bold;
            background: var(--success); color: white; border: none; border-radius: 8px; cursor: pointer;
        }

        /* PRINT SELECTOR AND CONTROL DESIGN */
        .print-control-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .select-filter {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid var(--dark);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
        }

        .btn-print {
            width: 100%; padding: 12px; font-size: 1.1rem; font-weight: bold;
            background: #6f42c1; color: white; border: none; border-radius: 8px; cursor: pointer;
        }

        .summary-box {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
            text-align: center; background: #343a40; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px;
        }
        .summary-box div span { display: block; font-size: 1.2rem; font-weight: bold; }

        .history-list { max-height: 400px; overflow-y: auto; }
        .history-item {
            padding: 12px; border-bottom: 1px solid #eee; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; margin-bottom: 5px; border-radius: 6px;
        }

        .btn-delete { background: none; border: none; color: var(--danger); font-size: 1.3rem; cursor: pointer; padding-left: 10px; }

        @media print {
            body * { visibility: hidden; }
            #historyLog, #historyLog *, .summary-box, .summary-box * { visibility: visible; }
            .summary-box { position: absolute; top: 0; left: 0; width: 100%; color: #000 !important; background: #fff !important; border: 1px solid #000; }
            #historyLog { position: absolute; top: 120px; left: 0; width: 100%; }
            .btn-delete { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card" style="border: 2px solid var(--primary);">
        <div class="wallet-banner">Pocket Cash Balance: <span id="totalWalletCash">₹0.00</span></div>
        <div class="drawer-grid">
            <div class="drawer-box">
                <div class="note-title">₹500 Note</div>
                <div class="note-count" id="count-500">0</div>
                <button class="counter-btn" onclick="adjustNote(500, -1)">-</button>
                <button class="counter-btn" onclick="adjustNote(500, 1)">+</button>
            </div>
            <div class="drawer-box">
                <div class="note-title">₹200 Note</div>
                <div class="note-count" id="count-200">0</div>
                <button class="counter-btn" onclick="adjustNote(200, -1)">-</button>
                <button class="counter-btn" onclick="adjustNote(200, 1)">+</button>
            </div>
            <div class="drawer-box">
                <div class="note-title">₹100 Note</div>
                <div class="note-count" id="count-100">0</div>
                <button class="counter-btn" onclick="adjustNote(100, -1)">-</button>
                <button class="counter-btn" onclick="adjustNote(100, 1)">+</button>
            </div>
            <div class="drawer-box">
                <div class="note-title">₹50 Note</div>
                <div class="note-count" id="count-50">0</div>
                <button class="counter-btn" onclick="adjustNote(50, -1)">-</button>
                <button class="counter-btn" onclick="adjustNote(50, 1)">+</button>
            </div>
            <div class="drawer-box">
                <div class="note-title">₹20 Note</div>
                <div class="note-count" id="count-20">0</div>
                <button class="counter-btn" onclick="adjustNote(20, -1)">-</button>
                <button class="counter-btn" onclick="adjustNote(20, 1)">+</button>
            </div>
            <div class="drawer-box">
                <div class="note-title">₹10 Note</div>
                <div class="note-count" id="count-10">0</div>
                <button class="counter-btn" onclick="adjustNote(10, -1)">-</button>
                <button class="counter-btn" onclick="adjustNote(10, 1)">+</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Fueled By (Staff Name)</label>
            <input type="text" id="staffName" class="text-input" placeholder="Enter name (e.g., Rohit, Amit)" oninput="saveStaffName()">
        </div>

        <label>Select Fuel Type</label>
        <div class="grid-2">
            <button id="fuel-Petrol" class="btn-choice fuel-btn active" onclick="setFuel('Petrol')">⛽ Petrol</button>
            <button id="fuel-Diesel" class="btn-choice fuel-btn fuel-diesel" onclick="setFuel('Diesel')">🚜 Diesel</button>
        </div>

        <label>Select Vehicle</label>
        <div class="grid-4">
            <button id="btn-Bike" class="btn-choice vehicle-btn active" onclick="setVehicle('Bike')">Bike</button>
            <button id="btn-Car" class="btn-choice vehicle-btn" onclick="setVehicle('Car')">Car</button>
            <button id="btn-Tractor" class="btn-choice vehicle-btn" onclick="setVehicle('Tractor')">Tractor</button>
            <button id="btn-Truck" class="btn-choice vehicle-btn" onclick="setVehicle('Truck')">Truck</button>
        </div>

        <label>Select Payment Mode</label>
        <div class="grid-2">
            <button id="btn-Cash" class="btn-choice mode-btn active" onclick="setMode('Cash')">Cash</button>
            <button id="btn-Online" class="btn-choice mode-btn" onclick="setMode('Online')">Online</button>
        </div>

        <div class="form-group">
            <label>1. Bill Amount (₹)</label>
            <input type="number" step="0.01" id="billAmount" class="big-input" placeholder="0.00" oninput="calculateChange()">
            <div class="chip-container" id="quickBillChips"></div>
        </div>

        <div class="form-group" id="paidSection">
            <label style="color: #007bff;">2. Cash Given by Customer (₹)</label>
            <input type="number" step="0.01" id="paidAmount" class="big-input" placeholder="0.00" oninput="calculateChange()">
            <div class="chip-container" id="quickPaidChips"></div>
        </div>

        <div class="math-panel">
            <div class="math-box">
                <div style="font-weight: bold;">Return to Customer</div>
                <div id="lblReturn" class="math-val text-danger">₹0.00</div>
            </div>
            <div class="math-box">
                <div style="font-weight: bold;">Extra Profit (Paise)</div>
                <div id="lblProfit" class="math-val text-success">₹0.00</div>
            </div>
        </div>

        <div id="suggestionContainer" class="suggestion-box" style="display: none;"></div>

        <button class="btn-submit" onclick="saveTransaction()">Save Entry</button>
    </div>

    <div class="card">
        <h3>Summary Ledger</h3>
        <div class="summary-box">
            <div>Cash Total<span id="sumCash">₹0</span></div>
            <div>Online Total<span id="sumOnline">₹0</span></div>
            <div>Extra Profit<span id="sumProfit">₹0</span></div>
        </div>

        <h3>Records List</h3>
        <div class="history-list" id="historyLog"></div>

        <div class="print-control-box">
            <select id="dateFilter" class="select-filter" onchange="filterDataView()">
                <option value="today">📅 Today's Data</option>
                <option value="yesterday">⏳ Yesterday's Data</option>
                <option value="all">🌐 All Records</option>
            </select>
            <button class="btn-print" onclick="window.print()">🖨️ PRINT LIST</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIGURATION CONFIG ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let selectedFuel = 'Petrol';
    let selectedVehicle = 'Bike';
    let selectedMode = 'Cash';
    
    let billShortcuts = [50, 100, 150, 200, 500];
    let paidShortcuts = [100, 200, 500, 2000];
    let cashDrawer = { 500: 0, 200: 0, 100: 0, 50: 0, 20: 0, 10: 0 };
    let temporarySuggestedNotes = null;
    let cachedTransactionsList = []; // Cache from cloud to allow localized filtering instantly

    if(localStorage.getItem('billShortcuts')) billShortcuts = JSON.parse(localStorage.getItem('billShortcuts'));
    if(localStorage.getItem('paidShortcuts')) paidShortcuts = JSON.parse(localStorage.getItem('paidShortcuts'));

    window.onload = function() {
        if(localStorage.getItem('savedStaffName')) {
            document.getElementById('staffName').value = localStorage.getItem('savedStaffName');
        }
        renderChips();
        listenToCloudData();
    };

    function saveStaffName() {
        const currentName = document.getElementById('staffName').value;
        localStorage.setItem('savedStaffName', currentName);
    }

    function listenToCloudData() {
        database.ref('cashDrawer').on('value', (snapshot) => {
            if(snapshot.exists()) {
                cashDrawer = snapshot.val();
                updateDrawerUI(false); 
            } else {
                database.ref('cashDrawer').set(cashDrawer);
            }
        });

        database.ref('transactions').orderByChild('timestamp').on('value', (snapshot) => {
            cachedTransactionsList = [];
            snapshot.forEach((childSnapshot) => {
                let item = childSnapshot.val();
                item.id = childSnapshot.key; 
                cachedTransactionsList.unshift(item); 
            });
            filterDataView(); // Trigger list population matching selection filter
        });
    }

    // INTERACTIVE DATE FILTER ENGINE
    function filterDataView() {
        const targetSelection = document.getElementById('dateFilter').value;
        
        const now = new Date();
        
        // Start and end parameters for Today
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
        const endOfToday = startOfToday + (24 * 60 * 60 * 1000) - 1;
        
        // Start and end parameters for Yesterday
        const startOfYesterday = startOfToday - (24 * 60 * 60 * 1000);
        const endOfYesterday = startOfToday - 1;

        let filteredRecords = [];

        if (targetSelection === 'today') {
            filteredRecords = cachedTransactionsList.filter(item => item.timestamp >= startOfToday && item.timestamp <= endOfToday);
        } else if (targetSelection === 'yesterday') {
            filteredRecords = cachedTransactionsList.filter(item => item.timestamp >= startOfYesterday && item.timestamp <= endOfYesterday);
        } else {
            filteredRecords = cachedTransactionsList; // 'all' records selection
        }

        renderLogView(filteredRecords);
    }

    function updateDrawerUI(shouldPushToCloud = true) {
        let grandTotal = 0;
        for (let note in cashDrawer) {
            document.getElementById(`count-${note}`).innerText = cashDrawer[note];
            grandTotal += parseInt(note) * cashDrawer[note];
        }
        document.getElementById('totalWalletCash').innerText = "₹" + grandTotal.toFixed(2);
        
        if(shouldPushToCloud) {
            database.ref('cashDrawer').set(cashDrawer);
        }
    }

    function adjustNote(denom, val) {
        cashDrawer[denom] = Math.max(0, cashDrawer[denom] + val);
        updateDrawerUI(true);
        calculateChange();
    }

    function setFuel(fuel) {
        selectedFuel = fuel;
        document.querySelectorAll('.fuel-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('fuel-' + fuel).classList.add('active');
    }

    // Vehicle selectors setup
    function setVehicle(vehicle) {
        selectedVehicle = vehicle;
        document.querySelectorAll('.vehicle-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + vehicle).classList.add('active');
    }

    function setMode(mode) {
        selectedMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        document.getElementById('paidSection').style.display = (mode === 'Online') ? 'none' : 'block';
        if(mode === 'Online') {
            document.getElementById('paidAmount').value = '';
            document.getElementById('suggestionContainer').style.display = 'none';
        }
        calculateChange();
    }

    function renderChips() {
        billShortcuts.sort((a, b) => a - b);
        paidShortcuts.sort((a, b) => a - b);
        document.getElementById('quickBillChips').innerHTML = billShortcuts.map(amt => `<button class="chip" onclick="applyBill(${amt})">₹${amt}</button>`).join('') + `<button class="chip chip-manage" onclick="manageShortcuts('bill')">+/- Edit</button>`;
        document.getElementById('quickPaidChips').innerHTML = paidShortcuts.map(amt => `<button class="chip" onclick="applyPaid(${amt})">₹${amt}</button>`).join('') + `<button class="chip chip-manage" onclick="manageShortcuts('paid')">+/- Edit</button>`;
    }

    function applyBill(amount) {
        document.getElementById('billAmount').value = amount;
        calculateChange();
        if(selectedMode === 'Cash') document.getElementById('paidAmount').focus();
    }

    function applyPaid(amount) {
        document.getElementById('paidAmount').value = amount;
        calculateChange();
    }

    function manageShortcuts(type) {
        let targetArray = type === 'bill' ? billShortcuts : paidShortcuts;
        let action = prompt("Type '+' to add (e.g. +300) or '-' to remove (e.g. -500):");
        if(!action) return;
        let operation = action.charAt(0);
        let value = parseFloat(action.substring(1).trim());
        if(isNaN(value)) return alert("Invalid number!");

        if(operation === '+') { if(!targetArray.includes(value)) targetArray.push(value); }
        else if(operation === '-') { let index = targetArray.indexOf(value); if(index > -1) targetArray.splice(index, 1); }

        localStorage.setItem(type === 'bill' ? 'billShortcuts' : 'paidShortcuts', JSON.stringify(targetArray));
        renderChips();
    }

    function calculateChange() {
        const bill = parseFloat(document.getElementById('billAmount').value) || 0;
        let paid = (selectedMode === 'Online') ? bill : (parseFloat(document.getElementById('paidAmount').value) || 0);

        let changeToReturn = 0, profitPaise = 0;
        if (paid > bill) {
            changeToReturn = Math.floor(paid - bill);
            let diff = (paid - bill) - changeToReturn;
            if(diff > 0) profitPaise = diff;
        } else if (paid === Math.ceil(bill) && bill % 1 !== 0) {
            profitPaise = paid - bill;
        }
        
        document.getElementById('lblReturn').innerText = "₹" + changeToReturn.toFixed(2);
        document.getElementById('lblProfit').innerText = "₹" + profitPaise.toFixed(2);

        if (selectedMode === 'Cash' && changeToReturn > 0) {
            suggestNotesToGive(changeToReturn);
        } else {
            document.getElementById('suggestionContainer').style.display = 'none';
            temporarySuggestedNotes = null;
        }
    }

    function suggestNotesToGive(amountNeeded) {
        let denominations = [500, 200, 100, 50, 20, 10];
        let runningAmount = amountNeeded;
        let suggestionResult = {};
        let tempDrawer = { ...cashDrawer };

        for (let denom of denominations) {
            if (runningAmount >= denom) {
                let notesNeeded = Math.floor(runningAmount / denom);
                let notesToUse = Math.min(notesNeeded, tempDrawer[denom]);
                if (notesToUse > 0) {
                    suggestionResult[denom] = notesToUse;
                    runningAmount -= (notesToUse * denom);
                }
            }
        }

        const container = document.getElementById('suggestionContainer');
        if (runningAmount === 0) {
            let textOutput = "👉 Handout Change: ";
            let parts = [];
            for (let denom in suggestionResult) {
                parts.push(`${suggestionResult[denom]} note(s) of ₹${denom}`);
            }
            container.innerHTML = textOutput + parts.join(', ');
            container.style.backgroundColor = "#d4edda";
            container.style.borderColor = "#28a745";
            container.style.color = "#155724";
            container.style.display = "block";
            temporarySuggestedNotes = suggestionResult; 
        } else {
            container.innerHTML = `⚠️ Short on cash change notes! Still need to hand out ₹${runningAmount}.`;
            container.style.backgroundColor = "#f8d7da";
            container.style.borderColor = "#dc3545";
            container.style.color = "#721c24";
            container.style.display = "block";
            temporarySuggestedNotes = null;
        }
    }

    function saveTransaction() {
        const staff = document.getElementById('staffName').value.trim() || "Unknown Staff";
        const bill = parseFloat(document.getElementById('billAmount').value);
        if(!bill || bill <= 0) return alert("Please specify a bill amount!");
        let paid = (selectedMode === 'Online') ? bill : (parseFloat(document.getElementById('paidAmount').value) || 0);
        if(selectedMode === 'Cash' && paid < bill) return alert("Paid cash is less than the bill amount!");

        if (selectedMode === 'Cash' && temporarySuggestedNotes) {
            for (let denom in temporarySuggestedNotes) {
                cashDrawer[denom] -= temporarySuggestedNotes[denom];
            }
            updateDrawerUI(true);
        }

        const record = {
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            staff: staff,
            fuel: selectedFuel,
            vehicle: selectedVehicle,
            mode: selectedMode,
            bill: bill,
            paid: paid,
            returned: parseFloat(document.getElementById('lblReturn').innerText.replace('₹','')) || 0,
            profit: parseFloat(document.getElementById('lblProfit').innerText.replace('₹','')) || 0
        };

        database.ref('transactions').push(record);

        document.getElementById('billAmount').value = '';
        document.getElementById('paidAmount').value = '';
        document.getElementById('lblReturn').innerText = "₹0.00";
        document.getElementById('lblProfit').innerText = "₹0.00";
        document.getElementById('suggestionContainer').style.display = 'none';
        temporarySuggestedNotes = null;
    }

    function deleteRecord(recordId) {
        if(!confirm("Are you sure you want to delete this transaction entry?")) return;
        database.ref('transactions').child(recordId).remove();
    }

    function renderLogView(data) {
        let cashTotal = 0, onlineTotal = 0, profitTotal = 0, logHtml = '';

        data.forEach(item => {
            if(item.mode === 'Cash') cashTotal += item.bill; else onlineTotal += item.bill;
            profitTotal += item.profit;
            
            logHtml += `<div class="history-item">
                <div>
                    <strong>${item.time}</strong> - <span style="color:var(--primary); font-weight:bold;">${item.staff}</span> fueled <span style="font-weight:bold;">${item.fuel}</span> to <span>${item.vehicle}</span> (${item.mode})<br>
                    <small>Bill: ₹${item.bill.toFixed(2)} | Recd: ₹${item.paid.toFixed(2)}</small>
                </div>
                <div style="text-align:right; display:flex; align-items:center;">
                    <div>
                        <span class="text-danger">Return: ₹${item.returned.toFixed(2)}</span><br>
                        <span class="text-success">Profit: +₹${item.profit.toFixed(2)}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteRecord('${item.id}')">❌</button>
                </div>
            </div>`;
        });

        document.getElementById('sumCash').innerText = "₹" + cashTotal.toFixed(2);
        document.getElementById('sumOnline').innerText = "₹" + onlineTotal.toFixed(2);
        document.getElementById('sumProfit').innerText = "₹" + profitTotal.toFixed(2);
        document.getElementById('historyLog').innerHTML = logHtml || '<p style="text-align:center;color:#666;">No records found for this time choice.</p>';
    }
</script>
</body>
</html>
